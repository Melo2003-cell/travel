<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <!-- main container -->
    <main class="w-full min-h-screen flex">
      <!-- side bar -->
      <section
        id="sidebar"
        class="hidden lg:flex lg:w-72 min-h-screen bg-gray-800 shadow-md flex-col justify-between"
      >
        <nav>
          <!-- Logo -->
          <div
            class="bg-black flex gap-2 justify-center items-center border-b p-2"
          >
            <img src="img/phoneicon.png" alt="Mobile Shop" class="w-10" />
            <h1 class="font-bold text-white text-2xl">MobileShop</h1>
            <button id="closeBtn" class="text-white text-lg lg:hidden p-2">
              ❌
            </button>
          </div>

          <!-- Menu -->
          <div id="menu" class="p-5">
            <h2 class="text-gray-500 mb-5">MANAGEMENT</h2>
            <ul class="space-y-5">
              <li>
                <a
                  href="#"
                  class="block text-white text-xl rounded-md p-2 bg-purple-400"
                  >Dashboard</a
                >
              </li>
              <li><a href="#" class="block text-white text-xl">Products</a></li>
              <li><a href="#" class="block text-white text-xl">Orders</a></li>
              <li><a href="#" class="block text-white text-xl">Users</a></li>
            </ul>
          </div>
        </nav>
        <!-- Logout -->
        <div class="border-t px-4">
          <button
            type="submit"
            class="w-full text-white p-4 bg-slate-600 rounded-xl shadow-md mt-4"
          >
            Logout
          </button>
        </div>
      </section>

      <!-- right side -->
      <section class="w-full">
        <!-- nav bar -->
        <nav class="w-full shadow-sm bg-white">
          <h1
            class="flex items-center gap-3w-4 p-4 font-bold shadow-md text-lg text-gray-700"
          >
            <button id="menuBtn" class="lg:hidden text-3xl text-gray-700 pl-7">
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
            <span class="pl-6">Dashboard</span>
          </h1>
        </nav>

        <!-- main content -->
        <div class="px-12">
          <div
            class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 my-8"
          >
            <!-- card1 -->
            <div
              class="flex border border-gray-200 rounded-lg shadow-lg p-8 gap-3"
            >
              <img
                src="img/dollar.png"
                alt="Dollar Sign"
                class="w-10 rounded-lg shadow-md bg-green-200 p-1"
              />
              <div>
                <p class="text-gray-500">Total Sales</p>
                <p class="font-bold text-lg">$0.00</p>
              </div>
            </div>
            <!-- card2 -->
            <div
              class="flex border border-gray-200 rounded-lg shadow-lg p-8 gap-3"
            >
              <img
                src="img/cart.png"
                alt="Cart"
                class="w-10 rounded-lg shadow-md bg-blue-200 p-1"
              />
              <div>
                <p class="text-gray-500">Total Orders</p>
                <p class="font-bold text-lg">0</p>
              </div>
            </div>
            <!-- card3 -->
            <div
              class="flex border border-gray-200 rounded-lg shadow-lg p-8 gap-3"
            >
              <img
                src="img/2person.png"
                alt="Cart"
                class="w-10 rounded-lg shadow-md bg-cyan-200 p-1"
              />
              <div>
                <p class="text-gray-500">Customers</p>
                <p class="font-bold text-lg">1</p>
              </div>
            </div>
            <!-- card4 -->
            <div
              class="flex border border-gray-200 rounded-lg shadow-lg p-8 gap-3"
            >
              <img
                src="img/danger.png"
                alt="Cart"
                class="w-10 rounded-lg shadow-md bg-red-200 p-1"
              />
              <div>
                <p class="text-gray-500">Low Stock Items</p>
                <p class="font-bold text-lg">0</p>
              </div>
            </div>
          </div>
          <!-- order data -->
          <div class="border-2 border-gray-200 rounded-xl shadow-xl">
            <div class="flex justify-between border-b w-full p-4">
              <p class="text-gray-800 font-semibold">Recent Orders</p>
              <a href="#" class="text-sm text-blue-500">View all >></a>
            </div>
            <table class="w-full text-left text-gray-500 text-xs">
              <tr>
                <th class="py-5 px-4">ORDER ID</th>
                <th class="py-5">CUSTOMER</th>
                <th class="py-5">DATE</th>
                <th class="py-5">TOTAL</th>
                <th class="py-5">STATUS</th>
              </tr>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script>
      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeBtn");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("hidden");
        // sidebar.classList.toggle("flex");
      });

      closeBtn.addEventListener("click", () => {
        sidebar.classList.add("hidden");
      });
    </script>
  </body>
</html>
