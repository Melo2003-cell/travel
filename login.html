<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<div>
   <section
        class=" flex flex-col items-center border-2 border-gray-100 rounded-lg shadow-md p-6 mx-auto w-1/3 max-w-xl sm:px-0 mt-5">

        <img src="img/addfri.png" alt="sign up" class="w-16 border-gray-200  rounded-lg bg-transparent p-4">


        <div class="py-4 mb-4">
            <h1 class="font-bold text-3xl text-center">Welcome Back</h1>
            <p class="text-gray-500">Enter your credentials to access your account.</p>

        </div>
        <div>
            <form class="flex flex-col gap-4 px-6">
                <!-- email-->

                <div class="space-y-2">
                    <label for="email" id="email" class="font-bold">Email Address</label>
                    <input type="email" name="email" placeholder="name@company.com"
                        class="border bg-slate-200 border-gray-300 rounded-lg py-2 px-4 w-full ">
                </div>

                <!-- password -->
                <div class="flex flex-col space-y-2">
                    <label for="password" id="password" class="font-bold">Password</label>
                    <input type="password" name="password"
                        class="border bg-slate-200 border-gray-300 rounded-lg py-2 px-4 ">
                </div>

                <div class="flex space-y-2 justify-between">
                  <label for="text" id="text" class="font-bold flex items-center gap-2">
                    <input type="checkbox">
                    <span>Remember me</span>
                  </label>
                    <a href="#" class="text-violet-800 font-bold">Forgot your password?</a>
                </div>

                <div class="flex items-center  my-4">
                    <button class="bg-violet-800 text-white p-2 rounded-lg w-full">Log In</button>
                </div>

            </form>
            <div class="flex items-center justify-center">
                <p>Don't have an account yet? <a href="register.html" class="text-violet-800 font-bold">Sign up for free</a></p>
            </div>
        </div>
    </section>
</div>
</body>

</html>
