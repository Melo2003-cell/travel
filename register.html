<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<div>




    <section class=" flex flex-col items-center border-2 border-gray-100 rounded-lg shadow-md p-6 mx-auto w-full max-w-xl sm:px-0 mt-5">
        
         <img src="img/addfri.png" alt="sign up" class="w-16 border-gray-200  rounded-lg bg-transparent p-4">
    

        <div class="py-4">
            <h1 class="font-bold text-3xl text-center">Create Account</h1>
            <p class="text-gray-500">Join us today!It only takes a minute.</p>

        </div>
        <div>
            <form class="flex flex-col gap-4 px-6">
                <!-- NAME -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2" >
                        <label for="name" id="name" class="font-bold  ">Full Name</label>
                        <input type="text" name="name" placeholder="John Doe"
                            class="border bg-slate-200 border-gray-300 rounded-lg py-2 px-4 w-full ">
                    </div>
                    <div class="space-y-2">
                        <label for="email" id="email" class="font-bold">Email Address</label>
                        <input type="email" name="email" placeholder="name@company.com"
                            class="border bg-slate-200 border-gray-300 rounded-lg py-2 px-4 w-full ">
                    </div>
                </div>

                <!-- password -->
                <div class="flex flex-col space-y-2">
                    <label for="password" id="password" class="font-bold">Password</label>
                    <input type="password" name="password"
                        class="border bg-slate-200 border-gray-300 rounded-lg py-2 px-4 ">
                </div>
                <div class="flex flex-col space-y-2">
                    <label for="confirm_password" id="confirm_password" class="font-bold">Confirm Password</label>
                    <input type="password" name="confirm_password"
                        class="border bg-slate-200 border-gray-300 rounded-lg py-2 px-4 ">
                </div>
                <div class="flex space-y-2">
                    <input type="checkbox">
                    <p>I agree to the <a href="#" class="text-violet-800 underline">Terms of Service</a> and <a href="#"
                            class="text-violet-800 underline">Privacy Policy</a></p>
                </div>
                <div class="flex items-center  my-4">
                    <button class="bg-violet-800 text-white p-2 rounded-lg w-full">Create My Account >></button>
                </div>

            </form>
            <div class="flex items-center justify-center">
                <p>Already have an account? <a href="login.html" class="text-violet-800 ">Sign in here</a></p>
            </div>




        </div> 
    </section>
</div>
</body>

</html>
